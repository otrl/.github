name: Build, test and publish

on:
  pull_request:
    branches:
      - master
      - /^[0-9]+\.[0-9]+\.[0-9]+(\-[0-9]+)?$/
      - /^feature\/.+$/
  push:
    tags:
      - '*'

env:
  SCALA_VERSION: ${{ SCALA_VERSION_2_12_10 }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  ARTIFACTORY_PASS: ${{ secrets.ARTIFACTORY_PASS }}

permissions:
  contents: read

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-20.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 1.8
        uses: otrl/setup-java@v1
        with:
          java-version: 1.8
          cache: 'sbt'
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and test
        run: sbt ++${{ env.SCALA_VERSION }} clean coverage test coverageOff docker:publishLocal

      - name: Docker Push PR
        env:
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -e
          PULL_TAG="pull-${{ github.event.number }}"          
          docker tag $DOCKER_REPO $DOCKER_REPO:${PULL_TAG} 
          docker push $DOCKER_REPO:${PULL_TAG}
          
      - name: Docker Push Tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          set -e
          for tag in ${{ github.ref_name }} latest; do
            docker tag $DOCKER_REPO $DOCKER_REPO:${tag} && docker push $DOCKER_REPO:${tag}
          done
  
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Push PR to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          PULL_TAG="pull-${{ github.event.number }}" 
          # Build a docker container and push it to ECR 
          echo "Pushing image to ECR..."
          docker tag $DOCKER_REPO:${PULL_TAG} $ECR_REPO$DOCKER_REPO:${PULL_TAG}
          docker push $ECR_REPO$DOCKER_REPO:${PULL_TAG}
          echo "::set-output name=image::$ECR_REPO$DOCKER_REPO:${PULL_TAG}"
        
      - name: Push Tag to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME }}
        if: ${{ github.ref_type == 'tag' }}
        run: |
          # Build a docker container and push it to ECR 
          echo "Pushing image to ECR..."
          docker tag $DOCKER_REPO:${tag} $ECR_REPO$DOCKER_REPO:${tag}
          docker push $ECR_REPO$DOCKER_REPO:${tag}
          echo "::set-output name=image::$ECR_REPO$DOCKER_REPO:$IMAGE_TAG"
